name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Type check, lint & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workaid/package-lock.json

      - name: Install dependencies
        working-directory: workaid
        run: npm ci

      - name: Type check
        working-directory: workaid
        run: npx tsc --noEmit

      - name: Lint
        working-directory: workaid
        run: npm run lint

      - name: Run tests
        working-directory: workaid
        run: npm run test:run
