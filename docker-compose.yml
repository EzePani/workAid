version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: workaid_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: workaid
      POSTGRES_PASSWORD: workaid123
      POSTGRES_DB: workaid_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
